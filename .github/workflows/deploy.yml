name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run docs:build

      - name: Locate and fix artifact path
        run: |
          REAL_DIST=$(find ${{ github.workspace }} -type d -name "dist" -not -path "*/node_modules/*" | head -1)
          if [ -z "$REAL_DIST" ]; then
            echo "❌ No dist directory found"
            exit 1
          fi
          echo "✅ Found dist at: $REAL_DIST"
          mkdir -p ${{ github.workspace }}/docs/.vitepress/dist
          cp -r $REAL_DIST/* ${{ github.workspace }}/docs/.vitepress/dist/
          ls -la ${{ github.workspace }}/docs/.vitepress/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/docs/.vitepress/dist
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4