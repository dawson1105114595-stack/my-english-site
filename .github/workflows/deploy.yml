name: Deploy site
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run docs:build
      
      - name: 📦 整理部署产物
        run: |
          # 找到 VitePress 默认生成的 dist 目录
          DIST_PATH=$(find . -type d -name "dist" | grep -v "node_modules" | head -n 1)
          # 创建一个干净的输出目录
          mkdir -p ./public
          # 将所有内容拷贝进去
          cp -r $DIST_PATH/* ./public/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4