name: Deploy site
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run docs:build
      
      - name: 📦 暴力搬运
        run: |
          # 找到那个生成的 dist 文件夹
          TARGET=$(find . -type d -name "dist" | grep -v "node_modules" | head -n 1)
          # 强行搬到一个叫 out 的普通目录
          mkdir -p ./out
          cp -r $TARGET/* ./out/
          # 打印一下，让我们亲眼看到 index.html
          ls -F ./out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 只传这个绝对存在的 out 文件夹
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4