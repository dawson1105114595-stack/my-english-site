name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with VitePress
        run: npm run docs:build

      - name: Final Path Fix
        # 这一步会自动寻找生成的 dist 目录并统一挪到根目录的 site_output 文件夹
        run: |
          SEARCH_PATH=$(find . -type d -name "dist" | grep -v "node_modules" | head -n 1)
          echo "Target dist found at: $SEARCH_PATH"
          mkdir -p ./site_output
          cp -r $SEARCH_PATH/* ./site_output/
          echo "Files in site_output:"
          ls -F ./site_output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 直接上传这个绝对存在的普通文件夹
          path: ./site_output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4